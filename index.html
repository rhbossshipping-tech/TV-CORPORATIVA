<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TV Corporativa</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial,sans-serif;
overflow:hidden;
}

#slide{
width:100vw;
height:90vh;
object-fit:cover;
}

#barra{
height:10vh;
background:#003366;
display:flex;
justify-content:space-around;
align-items:center;
font-size:30px;
font-weight:bold;
}

</style>

</head>

<body>

<img id="slide" src="https://picsum.photos/1920/1080">

<div id="barra">
<div id="hora"></div>
<div id="data"></div>
<div id="msg">TV Corporativa</div>
</div>

<script>

function atualizar(){

const agora = new Date();

document.getElementById("hora").innerHTML =
agora.toLocaleTimeString("pt-BR");

document.getElementById("data").innerHTML =
agora.toLocaleDateString("pt-BR");

}

setInterval(atualizar,1000);
atualizar();
async function carregarMoedas() {

    try {

        const response = await fetch(
            "https://economia.awesomeapi.com.br/json/last/USD-BRL,EUR-BRL"
        );

        const data = await response.json();

        document.getElementById("dolar").innerHTML =
            `💵 Dólar: R$ ${Number(data.USDBRL.bid).toFixed(2)}`;

        document.getElementById("euro").innerHTML =
            `💶 Euro: R$ ${Number(data.EURBRL.bid).toFixed(2)}`;

    } catch (e) {
        console.log(e);
    }
}

carregarMoedas();
setInterval(carregarMoedas, 300000);
  async function carregarTemperatura() {

    try {

        const response = await fetch(
            "https://wttr.in/Sao_Paulo?format=j1"
        );

        const data = await response.json();

        document.getElementById("temperatura").innerHTML =
            `🌡️ ${data.current_condition[0].temp_C}°C`;

    } catch (e) {
        console.log(e);
    }
}

carregarTemperatura();
setInterval(carregarTemperatura, 300000);
</script>

</body>
</html>
