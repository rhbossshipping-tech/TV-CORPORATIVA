<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Corporativa</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#000;
}

#slide{
    width:100vw;
    height:90vh;
    object-fit:cover;
}

#barra{
    height:10vh;
    background:#003366;
    color:white;

    display:flex;
    justify-content:space-around;
    align-items:center;

    font-size:24px;
    font-weight:bold;
}

</style>

</head>

<body>

<img id="slide" src="imagens/foto1.jpg">

<div id="barra">

    <div id="hora"></div>

    <div id="data"></div>

    <div id="temperatura">
        🌡️ Carregando...
    </div>

    <div>
        📍 São Paulo
    </div>

</div>

<script>

const imagens = [

"gustavo1ano.png",
"silvana4anos.png",
"valores"

];

let indice = 0;

function trocarImagem(){

    document.getElementById("slide").src =
        imagens[indice];

    indice++;

    if(indice >= imagens.length){
        indice = 0;
    }

}

trocarImagem();

setInterval(
    trocarImagem,
    10000
);

function atualizarHora(){

    const agora = new Date();

    document.getElementById("hora").innerHTML =
        agora.toLocaleTimeString("pt-BR");

    document.getElementById("data").innerHTML =
        agora.toLocaleDateString("pt-BR");

}

setInterval(
    atualizarHora,
    1000
);

atualizarHora();

async function carregarTemperatura(){

    try{

        const response =
            await fetch(
            "https://wttr.in/Sao_Paulo?format=j1"
            );

        const data =
            await response.json();

        document.getElementById("temperatura").innerHTML =
            "🌡️ " +
            data.current_condition[0].temp_C +
            "°C";

    }catch(error){

        console.log(error);

    }

}

carregarTemperatura();

setInterval(
    carregarTemperatura,
    300000
);

</script>

</body>
</html>
