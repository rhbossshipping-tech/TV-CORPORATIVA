```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Corporativa</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

#slide{
    width:100vw;
    height:90vh;
    object-fit:cover;
}

#barra{
    height:10vh;
    background:#003366;
    display:flex;
    justify-content:space-around;
    align-items:center;
    font-size:22px;
    font-weight:bold;
}

</style>

</head>

<body>

<img id="slide" src="https://picsum.photos/1920/1080">

<div id="barra">

    <div id="hora"></div>

    <div id="data"></div>

    <div id="temperatura">
        🌡️ Carregando...
    </div>

    <div id="dolar">
        💵 Carregando...
    </div>

    <div id="euro">
        💶 Carregando...
    </div>

</div>

<script>

function atualizarHora(){

    const agora = new Date();

    document.getElementById("hora").innerHTML =
        agora.toLocaleTimeString("pt-BR");

    document.getElementById("data").innerHTML =
        agora.toLocaleDateString("pt-BR");

}

setInterval(atualizarHora,1000);
atualizarHora();

async function carregarMoedas(){

    try{

        const response = await fetch(
            "https://economia.awesomeapi.com.br/json/last/USD-BRL,EUR-BRL"
        );

        const data = await response.json();

        document.getElementById("dolar").innerHTML =
            "💵 Dólar: R$ " +
            Number(data.USDBRL.bid).toFixed(2);

        document.getElementById("euro").innerHTML =
            "💶 Euro: R$ " +
            Number(data.EURBRL.bid).toFixed(2);

    }catch(error){

        console.log(error);

    }

}

carregarMoedas();

setInterval(
    carregarMoedas,
    300000
);

async function carregarTemperatura(){

    try{

        const response = await fetch(
            "https://wttr.in/Sao_Paulo?format=j1"
        );

        const data = await response.json();

        document.getElementById("temperatura").innerHTML =
            "🌡️ " +
            data.current_condition[0].temp_C +
            "°C";

    }catch(error){

        console.log(error);

    }

}

carregarTemperatura();

setInterval(
    carregarTemperatura,
    300000
);

</script>

</body>
</html>
```
